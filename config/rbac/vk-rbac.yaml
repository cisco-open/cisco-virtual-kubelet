# Service account used by all Virtual Kubelet deployments
# This should be created in each namespace where CiscoDevice CRs will run
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cisco-virtual-kubelet
  namespace: default
---
# ClusterRole defining the permissions required by Virtual Kubelet
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cisco-virtual-kubelet
rules:
  # Pod operations
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  
  # Node operations
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["get", "update", "patch"]
  
  # ConfigMap and Secret access (for pod volumes)
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  
  # Service operations (for pod DNS/service discovery)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  
  # PersistentVolumeClaim operations
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  
  # Events (for logging pod events)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
# ClusterRoleBinding for the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cisco-virtual-kubelet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cisco-virtual-kubelet
subjects:
  - kind: ServiceAccount
    name: cisco-virtual-kubelet
    namespace: default
