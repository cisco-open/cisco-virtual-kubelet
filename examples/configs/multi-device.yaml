# Multi-Device Deployment Note
#
# The current architecture supports one device per provider instance.
# To manage multiple Catalyst 8000V devices, run separate provider instances,
# each with its own configuration file and unique node_name.
#
# Example: Deploy three cat8kv devices as separate Kubernetes nodes
#
# Instance 1: cat8kv-node-1 -> 192.168.1.100
# Instance 2: cat8kv-node-2 -> 192.168.1.101
# Instance 3: cat8kv-node-3 -> 192.168.1.102
#
# Each instance runs independently and registers as a separate node.

# --- config-node-1.yaml ---
device:
  name: cat8kv-router-1
  driver: XE
  address: "192.168.1.100"
  port: 443
  username: admin
  password: cisco123
  tls:
    enabled: true
    insecureSkipVerify: true
  networking:
    dhcpEnabled: true
    virtualPortGroup: "0"
    defaultVRF: ""

kubelet:
  node_name: "cat8kv-node-1"
  namespace: ""
  update_interval: "30s"
  os: "Linux"
  node_internal_ip: "192.168.1.100"

