# Multi-Device Configuration Example
# Use this template when managing multiple Cisco devices from one provider

nodeName: cisco-datacenter-cluster

devices:
  - name: c9k-switch-rack1
    type: c9k
    address: 192.168.1.100
    port: 443
    username: admin
    password: cisco123
    useHTTPS: true
    verifyTLS: false

  - name: c9k-switch-rack2
    type: c9k
    address: 192.168.1.101
    port: 443
    username: admin
    password: cisco123
    useHTTPS: true
    verifyTLS: false

  - name: c8k-edge-router
    type: c8k
    address: 192.168.2.100
    port: 443
    username: admin
    password: cisco123
    useHTTPS: true
    verifyTLS: false

networkConfig:
  defaultGateway: "192.168.1.1"
  subnetMask: "255.255.255.0"
  ipPoolStart: "192.168.1.200"
  ipPoolEnd: "192.168.1.250"
  vlanID: 100
  managementInterface: 0

resourceDefaults:
  cpuUnits: 1000
  memoryMB: 512
  diskMB: 1024
  vcpu: 1
  profile: "custom"
