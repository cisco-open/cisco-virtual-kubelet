# Example: Kubernetes Node manifest for manual node management
# Note: Nodes are typically auto-created by the provider
apiVersion: v1
kind: Node
metadata:
  name: cisco-switch-01
  labels:
    type: virtual-kubelet
    cisco.com/provider: cisco
    kubernetes.io/hostname: cisco-switch-01
    kubernetes.io/os: Linux
    kubernetes.io/arch: amd64
    kubernetes.io/role: agent
