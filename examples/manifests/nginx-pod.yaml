# Example: Deploy nginx to a Cisco switch
apiVersion: v1
kind: Pod
metadata:
  name: nginx-on-switch
  namespace: default
  labels:
    app: nginx
    environment: development
spec:
  # Target the Cisco virtual kubelet node
  nodeSelector:
    kubernetes.io/hostname: cisco-switch-01
  
  # Tolerate the virtual-kubelet taint
  tolerations:
  - key: "virtual-kubelet.io/provider"
    operator: "Equal"
    value: "cisco"
    effect: "NoSchedule"
  
  containers:
  - name: nginx
    # Image path on device flash storage
    image: flash:/nginx.tar
    
    # Resource requests and limits
    resources:
      requests:
        cpu: "500m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
